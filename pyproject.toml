[project]
name = "xaivision-autoblock"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "niquests>=3.20.1",
    "robyn>=0.88.0",
    "shapely>=2.1.2",
    "ultralytics>=8.4.95",
]

[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["xaivision_autoblock*"]
